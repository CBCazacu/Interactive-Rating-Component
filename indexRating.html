<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rating</title>
    <link rel="stylesheet" href="styleRating.css">
</head>
<body>
    
    <div class="rating-screen" id="rating">

        <div class="circle circle-icon"><img class="icon-star" src="/Main/interactive-rating-component-main/images/icon-star.svg" alt="star"></div>

        <h1 class="question">How did we do?</h1>

        <p class="paragraph">Please let us know how we did with your support request. All feedback is appreciated to help us improve our offering!</p>

        <div id="rating-score">

            <div class="circle ratingCircle" id="circle1">
                <button class="number">1</button>
            </div>
            <div class="circle ratingCircle" id="circle2">
                <button class="number">2</button>
            </div>
            <div class="circle ratingCircle" id="circle3">
                <button class="number">3</button>
            </div>
            <div class="circle ratingCircle" id="circle4"> 
                <button class="number">4</button>
            </div>
            <div class="circle ratingCircle" id="circle5">
                <button class="number">5</button>
            </div>


        </div>

        <button class="submit-button" id="submit">SUBMIT</button>

    </div>


    <div class="thank-you-screen" id="thanks">

        <img class="phone-image" src="/Main/interactive-rating-component-main/images/illustration-thank-you.svg" alt="image">

        <p class="rating-statement">You selected out of 5</p>

        <h1 class="thank-you-title">Thank you!</h1>

        <p class="rating-comment">We appreciate you taking the time to give a rating. If you ever need more support, don’t hesitate to get in touch!</p>

    </div>

    <script src="actionRating.js"></script>
    
</body>
</html>
